<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homeschool Hub - AI Assistant</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f7f6;
      margin: 0;
      padding: 20px;
      color: #333;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    .navbar {
      display: flex;
      background-color: #2c3e50;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 25px;
    }
    .navbar a {
      color: white;
      text-decoration: none;
      padding: 10px 15px;
      font-weight: bold;
    }
    .navbar a:hover {
      background-color: #3498db;
      border-radius: 4px;
    }
    h2 { color: #2c3e50; border-bottom: 2px solid #27ae60; padding-bottom: 10px; }
    .card { background: #f8f9fa; padding: 20px; border-radius: 8px; border-left: 4px solid #27ae60; }
    #chatbox { height: 350px; border: 1px solid #ddd; overflow-y: auto; padding: 15px; background: #fff; margin-bottom: 15px; border-radius: 6px; }
    .input-area { display: flex; gap: 10px; }
    #userInput { flex-grow: 1; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 1em; }
    button { padding: 12px 20px; background: #27ae60; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1em; font-weight: bold; }
    button:hover { background: #219150; }
    .user { margin: 8px 0; color: #2980b9; line-height: 1.4; }
    .ai { margin: 8px 0; color: #27ae60; line-height: 1.4; }
  </style>
</head>
<body>

  <div class="container">
    <div class="navbar">
      <a href="index.html">🏠 Home</a>
      <a href="math.html">📐 Math 6 Room</a>
      <a href="ai-chat.html">🤖 AI Assistant</a>
    </div>

    <h2>AI Study Companion 🤖</h2>
    
    <div class="card">
      <div id="chatbox">
        <div class="ai"><b>AI:</b> Welcome to your dedicated study session! Enter your Gemini API Key in the code to unlock my smart responses, or drop your question below!</div>
      </div>
      <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask a study question or math check..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <script>
    // To make this fully functional later, swap "YOUR_API_KEY" with your actual key from Google AI Studio
    const API_KEY = "YOUR_ACTUAL_API_KEY_HERE"; 
    const chatHistory = [];

    function handleKeyPress(event) {
      if (event.key === "Enter") {
        sendMessage();
      }
    }

    async function sendMessage() {
      const inputField = document.getElementById("userInput");
      const chatbox = document.getElementById("chatbox");
      const userMessage = inputField.value.trim();
      
      if (!userMessage) return;

      // Append user message to log
      chatbox.innerHTML += `<div class="user"><b>You:</b> ${userMessage}</div>`;
      inputField.value = "";
      chatbox.scrollTop = chatbox.scrollHeight;

      // Store in standard api structure
      chatHistory.push({ "role": "user", "parts": [{ "text": userMessage }] });

      // Shortcut catch if API key hasn't been set up yet
      if (API_KEY === "YOUR_ACTUAL_API_KEY_HERE") {
        setTimeout(() => {
          chatbox.innerHTML += `<div class="ai"><b>AI:</b> I received your message: "${userMessage}". To let me think intelligently, remember to open this <code>ai-chat.html</code> file in Notepad and paste your real Google API key at the bottom!</div>`;
          chatbox.scrollTop = chatbox.scrollHeight;
        }, 600);
        return;
      }

      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ "contents": chatHistory })
        });

        const data = await response.json();
        const aiReply = data.candidates[0].content.parts[0].text;

        chatbox.innerHTML += `<div class="ai"><b>AI:</b> ${aiReply}</div>`;
        chatbox.scrollTop = chatbox.scrollHeight;

        chatHistory.push({ "role": "model", "parts": [{ "text": aiReply }] });

      } catch (error) {
        chatbox.innerHTML += `<div class="ai" style="color:red;"><b>Error:</b> Could not reach Gemini servers. Verify your API key is correct.</div>`;
        chatbox.scrollTop = chatbox.scrollHeight;
      }
    }
  </script>

</body>
</html>
