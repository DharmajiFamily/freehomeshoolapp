<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homeschool app</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f7f6;
      margin: 0;
      padding: 20px;
      color: #333;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
    .card { background: #f8f9fa; padding: 15px; border-radius: 8px; border-left: 4px solid #3498db; }
    #chatbox { height: 200px; border: 1px solid #ddd; overflow-y: auto; padding: 10px; background: #fff; margin-bottom: 10px; border-radius: 4px; }
    #userInput { width: 75%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
    button { padding: 8px 12px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #2980b9; }
    .user { color: #2980b9; font-weight: bold; }
    .ai { color: #27ae60; font-weight: bold; }
  </style>
</head>
<body>

  <script>
    var password = prompt("Enter password to access your dashboard:");
    if (password !== "KeepOut123") {
      alert("Incorrect password.");
      window.location.href = "https://google.com"; 
    }
  </script>

  <div class="container">
    <h1>Welcome to Your Homeschool App 📚</h1>
    <p>Tdashboard space.</p>

    <div class="grid">
      <div class="card">
        <h3>Quick Dashboard Links</h3>
        <ul>
          <li><a href="https://google.com" target="_blank">Google Search</a></li>
          <li><a href="https://github.com" target="_blank">My GitHub Profile</a></li>
        </ul>
        <p style="font-size: 0.85em; color: #7f8c8d;">You can open index.html in Notepad to change these links anytime!</p>
      </div>

      <div class="card">
        <h3>AI Assistant Space</h3>
        <div id="chatbox">
          <div class="ai">AI: Hello! Ready to build something great today?</div>
        </div>
        <input type="text" id="userInput" placeholder="Type here...">
        <button onclick="localChat()">Send</button>
      </div>
    </div>
  </div>

  <script>
    function localChat() {
      const input = document.getElementById("userInput");
      const box = document.getElementById("chatbox");
      if(input.value.trim() === "") return;
      
      box.innerHTML += `<div class="user">You: ${input.value}</div>`;
      box.innerHTML += `<div class="ai">AI: I hear you! Once we connect your real API key online, I will reply intelligently here.</div>`;
      input.value = "";
      box.scrollTop = box.scrollHeight;
    }
  </script>

</body>
</html>
