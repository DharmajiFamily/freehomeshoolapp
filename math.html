  <script>
    function changeVideo() {
      const selection = document.getElementById("videoSelect").value;
      const videoBox = document.getElementById("videoBox");
      const altBox = document.getElementById("altBox");
      const player = document.getElementById("mathVideoPlayer");

      if (selection === "none") {
        videoBox.style.display = "none";
        player.src = "";
        altBox.style.display = "block";
      } else {
        altBox.style.display = "none";
        videoBox.style.display = "block";
        player.src = selection;
      }
    }
    
    // Automatically check the first item on bootup
    changeVideo();
  </script>
